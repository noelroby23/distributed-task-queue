      QUEUE_NAME: task_queue
      DEAD_LETTER_QUEUE_NAME: task_queue_dead_letter
      SCHEDULED_QUEUE_NAME: task_queue:scheduled
      MAX_RETRIES: 3
      DEFAULT_TASK_TIMEOUT: 30
      WORKER_POLL_TIMEOUT: 1
      WORKER_HEARTBEAT_TTL: 30
      PYTHONUNBUFFERED: 1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data

